name: CI

on: [push, pull_request]

jobs:
  test:
    runs-on: ubuntu-latest
    env:
        DATASET_PATH: "test"
        API_KEY: "test"
        DB_CONNECTION_STR: "test"
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-python@v4
        with:
          python-version: '3.14'
      - run: pip install -r requirements.txt
      - run: python -m pytest tests/
      - run: python -m ruff check . 