sources:
  - name: raw
    schema: public
    tables:
      - name: raw_matches
        columns:
          - name: match_id
            tests:
              - unique
              - not_null
        config:
          loaded_at_field: time_added
          freshness:
            warn_after:
              count: 24
              period: hour
            error_after:
              count: 48
              period: hour
      - name: players
        columns:
          - name: player_id
            tests:
              - unique
              - not_null
          - name: name
            tests:
              - not_null
      - name: player_id_lookup
        columns:
          - name: player_id
            tests:
              - not_null
              - relationships:
                  arguments:
                    to: source('raw', 'players')
                    field: player_id
          - name: api_player_id
            tests:
              - not_null
          - name: api_name
            tests:
              - not_null