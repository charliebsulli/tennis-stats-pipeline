sources:
  - name: raw
    schema: public
    tables:
      - name: raw_matches
        columns:
          - name: match_id
            tests:
              - unique
              - not_null
        config:
          loaded_at_field: time_added
          freshness:
            warn_after:
              count: 24
              period: hour
            error_after:
              count: 48
              period: hour