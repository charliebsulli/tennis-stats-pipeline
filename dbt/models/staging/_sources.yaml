sources:
  - name: raw
    schema: public
    tables:
      - name: raw_matches
        columns:
          - name: match_id
            tests:
              - unique
              - not_null
          - name: time_added
            tests:
              - not_null
          - name: source
            tests:
              - not_null
              - accepted_values:
                  arguments:
                    values: ['sackmann', 'rapidapi']
          - name: winner_id
            tests:
              - not_null:
                  config:
                    where: "source = 'sackmann'"
          - name: loser_id
            tests:
              - not_null:
                  config:
                    where: "source = 'sackmann'"
          - name: tourney_id
            tests:
              - not_null:
                  config:
                    where: "source = 'sackmann'"
          - name: tourney_date
            tests:
              - not_null:
                  config:
                    where: "source = 'sackmann'"
          - name: rapidapi_match_id
            tests:
              - not_null:
                  config:
                    where: "source = 'rapidapi'"
          - name: rapidapi_winner_id
            tests:
              - not_null:
                  config:
                    where: "source = 'rapidapi'"
          - name: rapidapi_loser_id
            tests:
              - not_null:
                  config:
                    where: "source = 'rapidapi'"
          - name: rapidapi_tournament_id
            tests:
              - not_null:
                  config:
                    where: "source = 'rapidapi'"
          - name: match_date
            tests:
              - not_null:
                  config:
                    where: "source = 'rapidapi'"
        config:
          loaded_at_field: time_added
          freshness:
            warn_after:
              count: 24
              period: hour
            error_after:
              count: 48
              period: hour
      - name: players
        columns:
          - name: player_id
            tests:
              - unique
              - not_null
          - name: name
            tests:
              - not_null
      - name: player_id_lookup
        columns:
          - name: player_id
            tests:
              - not_null
              - relationships:
                  arguments:
                    to: source('raw', 'players')
                    field: player_id
          - name: api_player_id
            tests:
              - not_null
          - name: api_name
            tests:
              - not_null