models:
  - name: stg_matches
    columns:
      - name: match_id
        tests:
          - unique
          - not_null
          - relationships:
              arguments:
                to: source('raw', 'raw_matches')
                field: match_id
      - name: tourney_id
        tests:
          - not_null
      - name: winner_id
        tests:
          - not_null
          - relationships:
              arguments:
                to: source('raw', 'players')
                field: player_id
      - name: loser_id
        tests:
          - not_null
          - relationships:
              arguments:
                to: source('raw', 'players')
                field: player_id
      - name: match_date
        tests:
          - not_null
      - name: surface
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: ['Hard', 'Clay', 'Grass', 'Carpet', 'Unknown']